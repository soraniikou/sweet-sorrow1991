<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sweet sorrow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #e8f1f5;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "ヒラギノ角ゴ ProN W3", "メイリオ", sans-serif;
    color: #3a5a6a;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* 流れる小川 */
  canvas#stream {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* 中央コンテンツ */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    margin-bottom: 0.6rem;
    color: #4a6b7c;
  }

  .subtitle {
    font-size: clamp(0.8rem, 2vw, 0.95rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    margin-bottom: 3rem;
    opacity: 0.7;
    color: #6a8b9c;
  }

  .buttons {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    color: #4a6b7c;
    padding: 0.85rem 2.4rem;
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.4s ease;
    font-family: inherit;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.8);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(120, 160, 180, 0.2);
  }

  button:active {
    transform: translateY(0);
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 2rem;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    opacity: 0;
    transition: opacity 0.6s ease;
    color: #6a8b9c;
    font-weight: 300;
  }

  .status.show {
    opacity: 0.7;
  }

  /* 流れているとき、画面が少しだけ揺らぐ */
  body.playing .content {
    animation: gentle-drift 8s ease-in-out infinite;
  }

  @keyframes gentle-drift {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
</style>
</head>
<body>
  <canvas id="stream"></canvas>

  <div class="content">
    <h1>sweet sorrow</h1>
    <p class="subtitle">流れにそっと耳をすます</p>
    <div class="buttons">
      <button id="listenBtn">Listen</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>
    <p class="status" id="status">　</p>
  </div>

  <audio id="audio" src="0504.mp4" loop preload="auto"></audio>

<script>
  // ===== 小川の描画 =====
  const canvas = document.getElementById('stream');
  const ctx = canvas.getContext('2d');
  let W, H;
  let isPlaying = false;
  let time = 0;

  function resize() {
    W = canvas.width = window.innerWidth * window.devicePixelRatio;
    H = canvas.height = window.innerHeight * window.devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  // 流れる線(小川)を複数本
  const streams = [];
  const STREAM_COUNT = 7;
  for (let i = 0; i < STREAM_COUNT; i++) {
    streams.push({
      y: Math.random(),
      speed: 0.0003 + Math.random() * 0.0006,
      amp: 20 + Math.random() * 40,
      freq: 0.002 + Math.random() * 0.003,
      phase: Math.random() * Math.PI * 2,
      width: 1 + Math.random() * 2,
      opacity: 0.15 + Math.random() * 0.25
    });
  }

  // 光の粒
  const particles = [];
  for (let i = 0; i < 30; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0.3 + Math.random() * 0.7,
      vy: (Math.random() - 0.5) * 0.2,
      r: 1 + Math.random() * 2,
      opacity: 0.2 + Math.random() * 0.4
    });
  }

  function draw() {
    // やわらかい背景グラデーション
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#eaf3f7');
    grad.addColorStop(0.5, '#dbe9f0');
    grad.addColorStop(1, '#c9dde6');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const speedFactor = isPlaying ? 1 : 0.25;

    // 流れる線
    streams.forEach((s) => {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(120, 170, 200, ${s.opacity})`;
      ctx.lineWidth = s.width * window.devicePixelRatio;
      ctx.lineCap = 'round';
      const baseY = s.y * H;
      for (let x = 0; x <= W; x += 4) {
        const wave = Math.sin(x * s.freq + time * 0.001 + s.phase) * s.amp;
        const drift = Math.sin(time * s.speed * 100 + s.phase) * 30;
        const y = baseY + wave + drift;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    });

    // 光の粒(流れる)
    particles.forEach((p) => {
      p.x += p.vx * speedFactor * window.devicePixelRatio;
      p.y += p.vy * speedFactor * window.devicePixelRatio;
      if (p.x > W) {
        p.x = -10;
        p.y = Math.random() * H;
      }
      if (p.y < 0 || p.y > H) {
        p.y = Math.random() * H;
      }
      ctx.beginPath();
      ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
      ctx.arc(p.x, p.y, p.r * window.devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
    });

    time += isPlaying ? 16 : 4; // 再生中は速く流れる
    requestAnimationFrame(draw);
  }
  draw();

  // ===== 音声制御 =====
  const audio = document.getElementById('audio');
  const listenBtn = document.getElementById('listenBtn');
  const stopBtn = document.getElementById('stopBtn');
  const status = document.getElementById('status');

  listenBtn.addEventListener('click', () => {
    audio.currentTime = 0;
    audio.play().then(() => {
      isPlaying = true;
      document.body.classList.add('playing');
      listenBtn.disabled = true;
      stopBtn.disabled = false;
      status.textContent = '流れています';
      status.classList.add('show');
    }).catch((e) => {
      status.textContent = '音声を読み込めませんでした';
      status.classList.add('show');
      console.error(e);
    });
  });

  stopBtn.addEventListener('click', () => {
    audio.pause();
    audio.currentTime = 0;
    isPlaying = false;
    document.body.classList.remove('playing');
    listenBtn.disabled = false;
    stopBtn.disabled = true;
    status.textContent = '　';
    setTimeout(() => status.classList.remove('show'), 100);
  });
</script>
</body>
</html>
