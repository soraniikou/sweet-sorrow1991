<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>sweet sorrow — そばにいる</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "メイリオ", sans-serif; }
  body { position: relative; background: #2a4258; }
  canvas#stream { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; }
  .overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 30%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.25) 100%); pointer-events: none; z-index: 1; }
  .content { position: relative; z-index: 2; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 1.5rem; color: #c0d4e6; perspective: 1000px; }
  
  /* 丸みのある筆記体（OS標準フォントの中で最も柔らかいものを優先） */
  h1 { 
    font-family: "Bradley Hand", "Bradley Hand ITC", "Lucida Handwriting", "Comic Sans MS", "Apple Chancery", "Segoe Script", cursive;
    font-size: clamp(2.8rem, 8vw, 4.4rem); 
    font-weight: 600; 
    font-style: normal; 
    letter-spacing: 0.04em; 
    margin-bottom: 0.7rem; 
    color: #1a3050;
    filter: blur(2px);
    text-shadow: 0 0 24px rgba(26, 48, 80, 0.55), 0 0 48px rgba(26, 48, 80, 0.35);
    transform: rotate(-1.5deg);
    display: inline-block;
  }
  
  .subtitle { font-size: clamp(0.78rem, 2vw, 0.95rem); font-weight: 300; letter-spacing: 0.22em; margin-bottom: 3rem; opacity: 0.75; text-shadow: 0 1px 2px rgba(0,0,0,0.3); color: #b8ccdc; transition: opacity 10s ease; transform-style: preserve-3d; }
  .subtitle.fade-out { opacity: 0; }
  .subtitle.emerge { font-size: clamp(0.858rem, 2.2vw, 1.045rem); animation: emergeFromDepth 12s ease-out forwards; }
  @keyframes emergeFromDepth {
    0% { opacity: 0; transform: scale(0.55) translateZ(-120px); filter: blur(6px); }
    100% { opacity: 0.75; transform: scale(1) translateZ(0); filter: blur(0); }
  }
  .buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  button { background: rgba(255, 255, 255, 0.18); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.35); color: #e0ecf5; padding: 0.85rem 2.4rem; font-size: 0.95rem; font-weight: 300; letter-spacing: 0.25em; border-radius: 999px; cursor: pointer; transition: all 0.5s ease; font-family: inherit; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2); -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  button:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-2px); }
  button:active { transform: translateY(0); }
  button.hidden { display: none; }
  #listenBtn { padding: 0.765rem 2.16rem; font-size: 0.855rem; }
  #stopBtn { padding: 0.6885rem 1.944rem; font-size: 0.7695rem; background: rgba(255, 255, 255, 0.11); border-color: rgba(255, 255, 255, 0.24); color: #c5d2e0; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.28); }
  #stopBtn:hover { background: rgba(255, 255, 255, 0.17); }
  body.playing .content { animation: breathing 6s ease-in-out infinite; }
  @keyframes breathing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

  :root { --dark: 0; }

  .dark-layer {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(
      to bottom,
      rgba(14, 24, 40, calc(var(--dark) * 0.45)) 0%,
      rgba(8, 14, 26, calc(var(--dark) * 0.72)) 100%
    );
  }
</style>
</head>
<body>
<canvas id="stream"></canvas>
<div class="overlay"></div>
<div class="dark-layer" id="darkLayer" aria-hidden="true"></div>
<div class="content">
  <h1>sweet sorrow</h1>
  <p class="subtitle" id="tagline">ひとりの時間に、そばにいる声</p>
  <div class="buttons">
    <button id="listenBtn">Listen</button>
    <button id="stopBtn" class="hidden">Stop</button>
  </div>
</div>
<audio id="audio" src="0506.mp3" preload="metadata" playsinline webkit-playsinline></audio>
<script>
const canvas = document.getElementById('stream');
const ctx = canvas.getContext('2d');
let W, H, DPR, isPlaying = false, time = 0, flowAmount = 0;
let playT0 = 0;
let audioUnlocked = false;
let darkProgress = 0;
const WAVE_TIME_SCALE = 1 / 3;
const BASE_GRAD = ['#3d5878', '#365070', '#2e4865', '#26405a', '#1e3850'];
const DARK_GRAD = ['#243548', '#1e2d42', '#182536', '#121f30', '#0c1624'];

function mixHex(hex, targetHex, t) {
  const parse = (h) => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
  const [r1, g1, b1] = parse(hex);
  const [r2, g2, b2] = parse(targetHex);
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r}, ${g}, ${b})`;
}

function syncDarkProgress() {
  if (!isPlaying || !playT0) {
    darkProgress = 0;
    document.documentElement.style.setProperty('--dark', '0');
    return;
  }
  const sec = (Date.now() - playT0) / 1000;
  darkProgress = Math.min(1, sec / 50);
  document.documentElement.style.setProperty('--dark', String(darkProgress));
}
function resize() { DPR = window.devicePixelRatio || 1; W = window.innerWidth; H = window.innerHeight; canvas.width = W * DPR; canvas.height = H * DPR; canvas.style.width = W + 'px'; canvas.style.height = H + 'px'; ctx.setTransform(DPR, 0, 0, DPR, 0, 0); }
resize();
window.addEventListener('resize', resize);
function drawBase() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const stops = [0, 0.35, 0.55, 0.75, 1];
  stops.forEach((stop, i) => {
    grad.addColorStop(stop, mixHex(BASE_GRAD[i], DARK_GRAD[i], darkProgress));
  });
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  const blobAlpha = 1 - darkProgress * 0.55;
  drawSoftBlob(W*0.2, H*0.65, 280, `rgba(150,195,230,${0.22 * blobAlpha})`);
  drawSoftBlob(W*0.75, H*0.55, 320, `rgba(120,175,215,${0.18 * blobAlpha})`);
  drawSoftBlob(W*0.5, H*0.85, 400, `rgba(90,150,195,${0.16 * blobAlpha})`);
  drawSoftBlob(W*0.1, H*0.4, 240, `rgba(185,215,240,${0.24 * blobAlpha})`);
}
function drawSoftBlob(x, y, r, color) { const g = ctx.createRadialGradient(x, y, 0, x, y, r); g.addColorStop(0, color); g.addColorStop(1, 'rgba(255,255,255,0)'); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); }
function drawGrass() {
  ctx.fillStyle = 'rgba(100,145,175,0.28)';
  ctx.beginPath(); ctx.moveTo(0, H*0.5);
  for (let x = 0; x <= W; x += 6) { ctx.lineTo(x, H*0.5 + Math.sin(x*0.012)*6 + Math.sin(x*0.04)*3); }
  ctx.lineTo(W, H*0.5); ctx.lineTo(0, H*0.5); ctx.fill();
  ctx.fillStyle = 'rgba(75,125,160,0.38)';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 6) { ctx.lineTo(x, H*0.92 + Math.sin(x*0.008)*8 + Math.sin(x*0.05)*3); }
  ctx.lineTo(W, H); ctx.fill();
}
const streamLines = [];
for (let i = 0; i < 9; i++) {
  streamLines.push({
    yRatio: 0.55 + (i / 9) * 0.35,
    amp: 9 + Math.random() * 14,
    freq: 0.0045 + Math.random() * 0.007,
    freq2: 0.011 + Math.random() * 0.018,
    amp2: 3 + Math.random() * 7,
    phase: Math.random() * Math.PI * 2,
    phase2: Math.random() * Math.PI * 2,
    width: 0.6 + Math.random() * 1.4,
    opacity: 0.18 + Math.random() * 0.22,
    slow1: 0.00035 + Math.random() * 0.0009,
    slow2: 0.0002 + Math.random() * 0.00045,
    swayAmp1: 1 + Math.random() * 2.2,
    swayAmp2: 2.5 + Math.random() * 6,
    curveXFreq: 0.00025 + Math.random() * 0.0011,
    curveAmp: 5 + Math.random() * 16,
    curvePhase: Math.random() * Math.PI * 2,
    curveTime: 0.00006 + Math.random() * 0.00014,
    rollFreq: 0.00035 + Math.random() * 0.0009,
    rollAmp: 3 + Math.random() * 10,
    rollPhase: Math.random() * Math.PI * 2,
    rollTime: 0.00005 + Math.random() * 0.00012,
    w2Drift: 0.00004 + Math.random() * 0.0001
  });
}
function drawWaterLines() {
  const wt = time * WAVE_TIME_SCALE;
  streamLines.forEach((line) => {
    ctx.strokeStyle = `rgba(200, 230, 252, ${line.opacity * (0.45 + flowAmount * 0.55)})`;
    ctx.lineWidth = line.width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    const baseY = H * line.yRatio;
    const flowSpeed = wt * (0.00012 + flowAmount * 0.00055);
    const motion = 0.38 + flowAmount * 0.62;
    const phaseWobble = Math.sin(wt * line.slow1 + line.phase2) * line.swayAmp1;
    const vertSway = Math.sin(wt * line.slow2 + line.phase) * line.swayAmp2;
    for (let x = 0; x <= W; x += 2) {
      const longCurve =
        Math.sin(x * line.curveXFreq + wt * line.curveTime + line.curvePhase) * line.curveAmp * motion;
      const gentleRoll =
        Math.sin(x * line.rollFreq + wt * line.rollTime + line.rollPhase) * line.rollAmp * motion;
      const w1 = Math.sin(x * line.freq + flowSpeed * 4 + line.phase + phaseWobble) * line.amp * motion;
      const w2 =
        Math.sin(x * line.freq2 + flowSpeed * 2.2 + line.phase2 + wt * line.w2Drift) * line.amp2 * motion;
      const y = baseY + longCurve + gentleRoll + w1 + w2 + vertSway;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
}
const sparkles = [];
for (let i = 0; i < 22; i++) { sparkles.push({ x: Math.random()*1000, y: 500 + Math.random()*300, vx: 0.4 + Math.random()*1.2, vy: (Math.random()-0.5)*0.15, r: 0.8 + Math.random()*1.8, opacity: 0.3 + Math.random()*0.5, twinkle: Math.random()*Math.PI*2 }); }
function drawSparkles() {
  if (flowAmount < 0.05) return;
  sparkles.forEach((p) => {
    p.x += p.vx*flowAmount; p.y += p.vy*flowAmount; p.twinkle += 0.05;
    if (p.x > W+10) { p.x = -10; p.y = H*(0.55 + Math.random()*0.38); }
    if (p.y < H*0.5 || p.y > H*0.95) { p.y = H*(0.55 + Math.random()*0.38); }
    const tw = (Math.sin(p.twinkle)+1)*0.5;
    ctx.fillStyle = `rgba(210, 235, 255, ${p.opacity*flowAmount*tw})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
}
const leaves = [];
for (let i = 0; i < 4; i++) { leaves.push({ x: Math.random()*1000, y: 500 + Math.random()*200, vx: 0.15 + Math.random()*0.25, rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.005, size: 4 + Math.random()*4, color: `rgba(${95+Math.random()*35},${140+Math.random()*40},${175+Math.random()*35},0.48)` }); }
function drawLeaves() {
  leaves.forEach((leaf) => {
    leaf.x += leaf.vx*flowAmount; leaf.rot += leaf.rotSpeed*flowAmount;
    if (leaf.x > W+20) { leaf.x = -20; leaf.y = H*(0.6 + Math.random()*0.3); }
    ctx.save(); ctx.translate(leaf.x, leaf.y); ctx.rotate(leaf.rot);
    ctx.fillStyle = leaf.color; ctx.beginPath(); ctx.ellipse(0, 0, leaf.size, leaf.size*0.4, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });
}
function loop() {
  const target = isPlaying ? 1 : 0;
  flowAmount += (target - flowAmount)*0.02;
  drawBase(); drawGrass(); drawWaterLines(); drawLeaves(); drawSparkles();
  syncDarkProgress();
  updateAudioFade();
  time += 16;
  requestAnimationFrame(loop);
}
loop();

const audio = document.getElementById('audio');
const listenBtn = document.getElementById('listenBtn');
const stopBtn = document.getElementById('stopBtn');
const tagline = document.getElementById('tagline');
const TAGLINE_TEXT = 'ひとりの時間に、そばにいる声';
const GOODNIGHT_TEXT = 'おやすみなさい';
const FADE_OUT_SEC = 5;
const FADE_IN_SEC = 3;
const SUBTITLE_FADE_MS = 10000;
let hasLooped = false;
let taglineTimer = null;

function resetTagline() {
  if (taglineTimer) {
    clearTimeout(taglineTimer);
    taglineTimer = null;
  }
  tagline.textContent = TAGLINE_TEXT;
  tagline.classList.remove('fade-out', 'emerge');
  tagline.style.opacity = '';
}

function startTaglineSequence() {
  if (taglineTimer) {
    clearTimeout(taglineTimer);
    taglineTimer = null;
  }
  tagline.textContent = TAGLINE_TEXT;
  tagline.classList.remove('fade-out', 'emerge');
  tagline.style.opacity = '';
  void tagline.offsetWidth;
  tagline.classList.add('fade-out');

  taglineTimer = setTimeout(() => {
    taglineTimer = null;
    if (!isPlaying) return;
    tagline.classList.remove('fade-out');
    tagline.textContent = GOODNIGHT_TEXT;
    tagline.classList.add('emerge');
  }, SUBTITLE_FADE_MS);
}

function updateAudioFade() {
  if (!isPlaying || audio.paused) return;
  const dur = audio.duration;
  if (!dur || !Number.isFinite(dur)) return;
  const remaining = dur - audio.currentTime;
  if (remaining <= FADE_OUT_SEC) {
    audio.volume = Math.max(0, remaining / FADE_OUT_SEC);
    return;
  }
  if (hasLooped && audio.currentTime < FADE_IN_SEC) {
    audio.volume = Math.min(1, audio.currentTime / FADE_IN_SEC);
    return;
  }
  audio.volume = 1;
}

function startPlayback() {
  isPlaying = true;
  playT0 = Date.now();
  document.body.classList.add('playing');
  listenBtn.classList.add('hidden');
  stopBtn.classList.remove('hidden');
  startTaglineSequence();
}

async function restartPlaybackLoop() {
  if (!isPlaying) return;
  hasLooped = true;
  audio.currentTime = 0;
  audio.volume = 0;
  try {
    await audio.play();
  } catch (e) {
    console.error('Loop restart failed:', e);
  }
}

listenBtn.addEventListener('click', async () => {
  try {
    if (!audioUnlocked) {
      audio.load();
      audioUnlocked = true;
    }
    hasLooped = false;
    audio.currentTime = 0;
    audio.volume = 1.0;
    audio.muted = false;

    const playPromise = audio.play();
    if (playPromise !== undefined) {
      await playPromise;
    }
    startPlayback();
  } catch (e) {
    console.error('Audio play error:', e);
    setTimeout(async () => {
      try {
        audio.load();
        hasLooped = false;
        audio.currentTime = 0;
        audio.volume = 1.0;
        await audio.play();
        startPlayback();
      } catch (err) {
        console.error('Retry failed:', err);
        tagline.textContent = '音声を読み込めませんでした';
        setTimeout(() => { tagline.textContent = TAGLINE_TEXT; }, 6000);
      }
    }, 500);
  }
});

stopBtn.addEventListener('click', () => {
  isPlaying = false;
  hasLooped = false;
  audio.pause();
  audio.currentTime = 0;
  audio.volume = 1;
  playT0 = 0;
  darkProgress = 0;
  document.documentElement.style.setProperty('--dark', '0');
  document.body.classList.remove('playing');
  stopBtn.classList.add('hidden');
  listenBtn.classList.remove('hidden');
  resetTagline();
});

audio.addEventListener('ended', () => {
  restartPlaybackLoop();
});

audio.addEventListener('canplay', () => {
  if (tagline.textContent.includes('読み込めません')) {
    resetTagline();
  }
});
</script>
</body>
</html>
